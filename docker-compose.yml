services:
  postgres:
    image: postgres:16-alpine
    container_name: schoolhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schoolhub
    ports:
      - '5432:5432'
    volumes:
      - schoolhub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d schoolhub']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  schoolhub-postgres-data:
